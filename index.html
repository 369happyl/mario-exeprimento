<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mario</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .game-board {
      width: 80%;
      height: 500px;
      border: 1px solid #333;
      border-bottom: 25px solid green;
      background: linear-gradient(#87CEEB, #E0F6EF);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .pipe {
      position: absolute;
      bottom: 0px;
      width: 80px;
      height: 80px;

      animation: pipe-animation 1.5s infinite linear;
    }

    .mario {
      width: 120px;
      position: absolute;
      bottom: 0px;
    }

    .jump {
      animation: jump 1s ease-out;
    }
  @media (max-width: 768px) {
  .pipe {
    width: 40px;
    height: 60px;
  }
  .mario { 
    width: 109px;
    height: 100px;
  }
  }
    @keyframes pipe-animation {
      from {
        right: -80px;
      }

      to {
        right: 100%;
      }
    }

    @keyframes jump {
      0% {
        bottom: 0;
      }

      40% {
        bottom: 160px;
      }

      50% {
        bottom: 160px;
      }

      60% {
        bottom: 160px;
      }

      100% {
        bottom: 0;
      }
    }
  </style>
</head>

<body>

  <div class="game-board">

    <img src="https://e7.pngegg.com/pngimages/336/299/png-clipart-green-super-mario-tunnel-pipe-illustration-super-mario-3d-world-super-mario-3d-land-super-mario-bros-new-super-mario-bros-pipe-super-mario-bros-waste-containment.png"
      class="pipe">

    <img src="https://media.tenor.com/UkvleU1dQK4AAAAj/2d-mario-running.gif"
      class="mario">

  </div>

  <script>
    const mario = document.querySelector(".mario");
    const pipe = document.querySelector(".pipe");

    const jump = () => {

      mario.classList.add("jump");

      setTimeout(() => {
        mario.classList.remove("jump");
      }, 1000);

    }

    const loop = setInterval(() => {

      const pipePosition = pipe.offsetLeft;

      const marioPosition = +window
        .getComputedStyle(mario)
        .bottom.replace('px', '');

      console.log(marioPosition);

      if (pipePosition <= 120 &&
        pipePosition > 0 &&
        marioPosition < 80) {

        pipe.style.animation = "none";
        pipe.style.left = `${pipePosition}px`;

        mario.style.animation = "none";
        mario.style.bottom = `${marioPosition}px`;

        mario.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwFqdNBh-rw5eXctYibZ8KPHNZYp5IHi8g6HZkZlNhnwx_PRt0JkwAdJ26&s=10";

        mario.style.width = "60px";
        mario.style.marginLeft = "50px";

        clearInterval(loop);
      }

    }, 10);

    document.addEventListener('touchstart', jump);
    document.addEventListener('keydown', jump);

  </script>

</body>

</html>
